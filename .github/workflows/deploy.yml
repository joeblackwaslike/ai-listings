name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/joeblackwaslike/ai-listings

jobs:
  build:
    name: Build ARM64 image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to k3s
    needs: build
    # Runs on the self-hosted runner inside the cluster — direct kubectl access, no Tailscale needed
    runs-on: [self-hosted, linux, arm64, k3s]
    environment: production

    steps:
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl

      - name: Update deployment image
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          kubectl set image deployment/ai-listings \
            ai-listings=${{ env.IMAGE }}:${IMAGE_TAG} \
            -n ai-listings

      - name: Wait for rollout
        run: kubectl rollout status deployment/ai-listings -n ai-listings --timeout=300s

      - name: Show running pods
        run: kubectl get pods -n ai-listings

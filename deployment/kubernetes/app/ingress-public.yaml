apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-listings-public
  namespace: ai-listings
  annotations:
    external-dns.alpha.kubernetes.io/target: 1ee1e71f-263e-4de6-a31b-7cb04cf79036.cfargotunnel.com
spec:
  ingressClassName: traefik
  rules:
  - host: ai-listings.joeblack.nyc
    http:
      paths:
      - path: /api/auth/callback/
        pathType: Prefix
        backend:
          service:
            name: ai-listings
            port:
              number: 3000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-listings
  namespace: ai-listings
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-listings
  template:
    metadata:
      labels:
        app: ai-listings
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: ai-listings
          image: ghcr.io/joeblackwaslike/ai-listings:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ai-listings-config
            - secretRef:
                name: ai-listings-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
